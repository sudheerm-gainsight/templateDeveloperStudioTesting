<style>
.html-widget-section {
  padding: 16px;
  font-family: "Inter", system-ui, -apple-system, sans-serif;
  border-radius: 12px;
  background: #DCF3FA;
  box-shadow: inset 5px 0 0 0 #4FC1E8, 0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
  color: #1e1e2e;
  box-sizing: border-box;
  max-width: 480px;
  margin: 24px 0 24px 24px;
}

.country-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.country-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  list-style: none;
}

.country-item + .country-item {
  border-top: 1px solid rgba(0, 0, 0, 0.07);
}

.country-flag {
  width: 36px;
  height: 24px;
  object-fit: cover;
  object-position: center;
  flex-shrink: 0;
  border-radius: 3px;
  border: 1px solid rgba(0, 0, 0, 0.08);
}

.country-details {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.country-name {
  font-size: 0.8125rem;
  font-weight: 600;
  color: #1e1e2e;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  line-height: 1.3;
}

.country-meta {
  font-size: 0.6875rem;
  color: #5a5a72;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
}

.widget-framework-header {
  margin: 0 0 10px 0;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #444458;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
